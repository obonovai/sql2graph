# Relational-to-graph mapping for the LDBC Social Network Benchmark
# (Interactive v1) dataset.
#
# Source of truth for the relational layout:
#   https://github.com/ldbc/ldbc_snb_interactive_v1_impls/blob/main/postgres/ddl/schema.sql
#
# 18 relational tables -> 8 node labels + 23 edge mappings.
# Junction tables (forum_person, forum_tag, person_tag, knows, likes,
# message_tag, person_university, person_company) become edges; the source-side
# FK is implicit and inferred by the LLM from the schema context (same pattern
# as TPC-H's `partsupp` -> SUPPLIES edge in tpch.yaml).
#
# Property naming follows the canonical LDBC SNB graph spec (camelCase, e.g.
# `firstName`, `creationDate`, `locationIP`); the right-hand side is the
# verbatim Postgres column name (with the `p_`, `m_`, `f_`, `pl_`, ... prefixes).
# Multi-valued attributes (`person_email`, `person_language`) are intentionally
# omitted — they map to list-valued properties in the LDBC graph spec, which
# the current NodeMapping schema cannot express.
#
# Subtype tables: `place.pl_type` distinguishes City/Country/Continent;
# `organisation.o_type` distinguishes Company/University. Both collapse to a
# single label here (Place / Organisation) since the relational schema has no
# separate tables for the subtypes.
#
# This file describes ONLY the schema mapping. Load with
# rows2graph.SchemaMapping.from_yaml.

nodes:
  - label: "Person"
    source_table: "person"
    properties:
      id: "p_personid"
      firstName: "p_firstname"
      lastName: "p_lastname"
      gender: "p_gender"
      birthday: "p_birthday"
      creationDate: "p_creationdate"
      locationIP: "p_locationip"
      browserUsed: "p_browserused"
    primary_key: "p_personid"

  - label: "Forum"
    source_table: "forum"
    properties:
      id: "f_forumid"
      title: "f_title"
      creationDate: "f_creationdate"
    primary_key: "f_forumid"

  - label: "Post"
    # LDBC subtype of the abstract "Message"; modelled as a standalone label
    # because the relational schema has no Message table.
    source_table: "post"
    properties:
      id: "m_messageid"
      imageFile: "m_ps_imagefile"
      creationDate: "m_creationdate"
      locationIP: "m_locationip"
      browserUsed: "m_browserused"
      language: "m_ps_language"
      content: "m_content"
      length: "m_length"
    primary_key: "m_messageid"

  - label: "Comment"
    # Sibling of Post (both extend the abstract LDBC "Message"). Comment.id
    # and Post.id share the same numeric space (m_messageid).
    source_table: "comment"
    properties:
      id: "m_messageid"
      creationDate: "m_creationdate"
      locationIP: "m_locationip"
      browserUsed: "m_browserused"
      content: "m_content"
      length: "m_length"
    primary_key: "m_messageid"

  - label: "Place"
    # `pl_type` distinguishes City / Country / Continent.
    source_table: "place"
    properties:
      id: "pl_placeid"
      name: "pl_name"
      url: "pl_url"
      type: "pl_type"
    primary_key: "pl_placeid"

  - label: "Organisation"
    # `o_type` distinguishes Company / University.
    source_table: "organisation"
    properties:
      id: "o_organisationid"
      type: "o_type"
      name: "o_name"
      url: "o_url"
    primary_key: "o_organisationid"

  - label: "Tag"
    source_table: "tag"
    properties:
      id: "t_tagid"
      name: "t_name"
      url: "t_url"
    primary_key: "t_tagid"

  - label: "TagClass"
    source_table: "tagclass"
    properties:
      id: "tc_tagclassid"
      name: "tc_name"
      url: "tc_url"
    primary_key: "tc_tagclassid"

edges:
  # ---------------------------------------------------------------------
  # Direct foreign keys (no junction table)
  # ---------------------------------------------------------------------

  - type: "CONTAINER_OF"
    # Forum --(CONTAINER_OF)--> Post. FK lives in `post.m_ps_forumid`.
    source_node: "Forum"
    target_node: "Post"
    source_table: "post"
    source_foreign_key: "m_ps_forumid"
    target_primary_key: "f_forumid"

  - type: "HAS_CREATOR"
    source_node: "Post"
    target_node: "Person"
    source_table: "post"
    source_foreign_key: "m_creatorid"
    target_primary_key: "p_personid"

  - type: "HAS_CREATOR"
    source_node: "Comment"
    target_node: "Person"
    source_table: "comment"
    source_foreign_key: "m_creatorid"
    target_primary_key: "p_personid"

  - type: "IS_LOCATED_IN"
    source_node: "Post"
    target_node: "Place"
    source_table: "post"
    source_foreign_key: "m_locationid"
    target_primary_key: "pl_placeid"

  - type: "IS_LOCATED_IN"
    source_node: "Comment"
    target_node: "Place"
    source_table: "comment"
    source_foreign_key: "m_locationid"
    target_primary_key: "pl_placeid"

  - type: "IS_LOCATED_IN"
    source_node: "Person"
    target_node: "Place"
    source_table: "person"
    source_foreign_key: "p_placeid"
    target_primary_key: "pl_placeid"

  - type: "IS_LOCATED_IN"
    source_node: "Organisation"
    target_node: "Place"
    source_table: "organisation"
    source_foreign_key: "o_placeid"
    target_primary_key: "pl_placeid"

  - type: "REPLY_OF"
    # Comment --(REPLY_OF)--> Post (top-level reply).
    source_node: "Comment"
    target_node: "Post"
    source_table: "comment"
    source_foreign_key: "m_replyof_post"
    target_primary_key: "m_messageid"

  - type: "REPLY_OF"
    # Comment --(REPLY_OF)--> Comment (nested reply, self-ref).
    source_node: "Comment"
    target_node: "Comment"
    source_table: "comment"
    source_foreign_key: "m_replyof_comment"
    target_primary_key: "m_messageid"

  - type: "HAS_MODERATOR"
    source_node: "Forum"
    target_node: "Person"
    source_table: "forum"
    source_foreign_key: "f_moderatorid"
    target_primary_key: "p_personid"

  - type: "IS_PART_OF"
    # Place --(IS_PART_OF)--> Place (self-ref: City -> Country -> Continent).
    source_node: "Place"
    target_node: "Place"
    source_table: "place"
    source_foreign_key: "pl_containerplaceid"
    target_primary_key: "pl_placeid"

  - type: "IS_SUBCLASS_OF"
    # TagClass --(IS_SUBCLASS_OF)--> TagClass (self-ref).
    source_node: "TagClass"
    target_node: "TagClass"
    source_table: "tagclass"
    source_foreign_key: "tc_subclassoftagclassid"
    target_primary_key: "tc_tagclassid"

  - type: "HAS_TYPE"
    # Tag --(HAS_TYPE)--> TagClass.
    source_node: "Tag"
    target_node: "TagClass"
    source_table: "tag"
    source_foreign_key: "t_tagclassid"
    target_primary_key: "tc_tagclassid"

  # ---------------------------------------------------------------------
  # Junction tables (source-side FK is implicit, inferred from schema)
  # ---------------------------------------------------------------------

  - type: "KNOWS"
    # Person --(KNOWS)--> Person via the `knows` table.
    # In LDBC, KNOWS is undirected; the relational data carries both rows
    # (k_person1id=A, k_person2id=B) and (k_person1id=B, k_person2id=A).
    source_node: "Person"
    target_node: "Person"
    source_table: "knows"
    source_foreign_key: "k_person2id"
    target_primary_key: "p_personid"
    properties:
      creationDate: "k_creationdate"

  - type: "HAS_MEMBER"
    source_node: "Forum"
    target_node: "Person"
    source_table: "forum_person"
    source_foreign_key: "fp_personid"
    target_primary_key: "p_personid"
    properties:
      joinDate: "fp_joindate"

  - type: "HAS_TAG"
    source_node: "Forum"
    target_node: "Tag"
    source_table: "forum_tag"
    source_foreign_key: "ft_tagid"
    target_primary_key: "t_tagid"

  - type: "HAS_TAG"
    # Post --(HAS_TAG)--> Tag via `message_tag`. mt_messageid is polymorphic
    # (refers to either a Post or a Comment); JOINing to `post` selects Posts.
    source_node: "Post"
    target_node: "Tag"
    source_table: "message_tag"
    source_foreign_key: "mt_tagid"
    target_primary_key: "t_tagid"

  - type: "HAS_TAG"
    # Comment --(HAS_TAG)--> Tag via the same `message_tag` table.
    source_node: "Comment"
    target_node: "Tag"
    source_table: "message_tag"
    source_foreign_key: "mt_tagid"
    target_primary_key: "t_tagid"

  - type: "HAS_INTEREST"
    source_node: "Person"
    target_node: "Tag"
    source_table: "person_tag"
    source_foreign_key: "pt_tagid"
    target_primary_key: "t_tagid"

  - type: "LIKES"
    # Person --(LIKES)--> Post. l_messageid is polymorphic; JOINing to `post`
    # selects Posts. Use the Comment variant below when JOINing to `comment`.
    source_node: "Person"
    target_node: "Post"
    source_table: "likes"
    source_foreign_key: "l_messageid"
    target_primary_key: "m_messageid"
    properties:
      creationDate: "l_creationdate"

  - type: "LIKES"
    source_node: "Person"
    target_node: "Comment"
    source_table: "likes"
    source_foreign_key: "l_messageid"
    target_primary_key: "m_messageid"
    properties:
      creationDate: "l_creationdate"

  - type: "STUDY_AT"
    # Person --(STUDY_AT)--> Organisation via `person_university`. The target
    # is conceptually a University (Organisation with o_type='university').
    source_node: "Person"
    target_node: "Organisation"
    source_table: "person_university"
    source_foreign_key: "pu_organisationid"
    target_primary_key: "o_organisationid"
    properties:
      classYear: "pu_classyear"

  - type: "WORK_AT"
    # Person --(WORK_AT)--> Organisation via `person_company`. Target is
    # conceptually a Company (Organisation with o_type='company').
    source_node: "Person"
    target_node: "Organisation"
    source_table: "person_company"
    source_foreign_key: "pc_organisationid"
    target_primary_key: "o_organisationid"
    properties:
      workFrom: "pc_workfrom"
