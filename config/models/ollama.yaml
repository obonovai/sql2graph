# Ollama LLM backend (local model server).

# `host` is optional: uncomment to pin an endpoint here (YAML wins). 
# When unset, the SDK reads OLLAMA_HOST environment variable.

provider: "ollama"
model: "qwen3-coder:30b"
# host: "http://<host>:<port>"
temperature: 0.1
num_ctx: 16384
repeat_penalty: 1.1
