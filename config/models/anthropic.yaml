# Anthropic LLM backend (direct API).
#
# Authentication: set the ANTHROPIC_API_KEY environment variable in your
# shell before invoking the demo. The SDK reads it automatically — there
# is no need to put the key in this YAML.
#
#     export ANTHROPIC_API_KEY="sk-ant-..."
#
# If you prefer, you may set `api_key` here (it supports ${ENV_VAR}
# interpolation, e.g. api_key: "${ANTHROPIC_API_KEY}"). Leaving it out is
# the recommended posture so this file stays safe to commit.

provider: "anthropic"
# api_key: "${ANTHROPIC_API_KEY}"
model: "claude-opus-4-7"
temperature: 0.1
max_output_tokens: 4096
