schema: ldbc
queries:
- id: ldbc_q01
  sql: |-
    SELECT id, first_name, last_name, birthday, creation_date
    FROM person
    WHERE id = 933;
  expected_cypher: |-
    MATCH (p:Person {id: 933})
    RETURN p.id, p.firstName, p.lastName, p.birthday, p.creationDate
  expected_aql: |-
    FOR p IN Person
      FILTER p.id == 933
      RETURN { id: p.id, firstName: p.firstName, lastName: p.lastName, birthday: p.birthday, creationDate: p.creationDate }
  difficulty: easy
  sql_features: []
  description: Point lookup by primary key (Person profile, cf. LDBC IS-1).
- id: ldbc_q02
  sql: |-
    SELECT id, creation_date, content
    FROM post
    WHERE creation_date >= '2010-06-01' AND creation_date < '2010-07-01';
  expected_cypher: |-
    MATCH (po:Post)
    WHERE po.creationDate >= datetime('2010-06-01T00:00:00') AND po.creationDate < datetime('2010-07-01T00:00:00')
    RETURN po.id, po.creationDate, po.content
  expected_aql: |-
    FOR po IN Post
      FILTER po.creationDate >= '2010-06-01' AND po.creationDate < '2010-07-01'
      RETURN { id: po.id, creationDate: po.creationDate, content: po.content }
  difficulty: easy
  sql_features: []
  description: Range query on a timestamp column.
- id: ldbc_q03
  sql: |-
    SELECT id, first_name, last_name
    FROM person
    WHERE first_name = 'Mahinda';
  expected_cypher: |-
    MATCH (p:Person {firstName: 'Mahinda'})
    RETURN p.id, p.firstName, p.lastName
  expected_aql: |-
    FOR p IN Person
      FILTER p.firstName == 'Mahinda'
      RETURN { id: p.id, firstName: p.firstName, lastName: p.lastName }
  difficulty: easy
  sql_features: []
  description: Lookup persons by first name.
- id: ldbc_q04
  sql: |-
    SELECT f.id, f.title, COUNT(*) AS member_count
    FROM forum f
    JOIN forum_has_member fhm ON fhm.forum_id = f.id
    GROUP BY f.id, f.title
    ORDER BY member_count DESC
    LIMIT 10;
  expected_cypher: |-
    MATCH (f:Forum)-[:HAS_MEMBER]->(p:Person)
    RETURN f.id, f.title, count(p) AS member_count
    ORDER BY member_count DESC
    LIMIT 10
  expected_aql: |-
    FOR f IN Forum
      LET member_count = LENGTH(FOR p IN 1..1 OUTBOUND f HAS_MEMBER RETURN 1)
      SORT member_count DESC
      LIMIT 10
      RETURN { id: f.id, title: f.title, member_count: member_count }
  difficulty: hard
  sql_features:
  - aggregation
  - join
  - order_limit
  description: Top forums by member count (junction-table aggregation).
- id: ldbc_q05
  sql: |-
    SELECT t.id, t.name, COUNT(*) AS usage_count
    FROM tag t
    JOIN (
      SELECT tag_id FROM post_has_tag
      UNION ALL
      SELECT tag_id FROM comment_has_tag
    ) mt ON mt.tag_id = t.id
    GROUP BY t.id, t.name
    ORDER BY usage_count DESC
    LIMIT 20;
  expected_cypher: |-
    MATCH (m)-[:HAS_TAG]->(t:Tag)
    WHERE m:Post OR m:Comment
    RETURN t.id, t.name, count(m) AS usage_count
    ORDER BY usage_count DESC
    LIMIT 20
  expected_aql: |-
    FOR t IN Tag
      LET usage_count = LENGTH(FOR m IN 1..1 INBOUND t HAS_TAG RETURN 1)
      SORT usage_count DESC
      LIMIT 20
      RETURN { id: t.id, name: t.name, usage_count: usage_count }
  difficulty: hard
  sql_features:
  - aggregation
  - join
  - order_limit
  - subquery
  - union
  description: Most-used tags across all posts and comments.
- id: ldbc_q06
  sql: |-
    SELECT p2.id, p2.first_name, p2.last_name, k.creation_date AS friendship_date
    FROM person p1
    JOIN knows k ON k.person_id = p1.id
    JOIN person p2 ON p2.id = k.friend_id
    WHERE p1.id = 933;
  expected_cypher: |-
    MATCH (p1:Person {id: 933})-[k:KNOWS]->(p2:Person)
    RETURN p2.id, p2.firstName, p2.lastName, k.creationDate AS friendship_date
  expected_aql: |-
    FOR p1 IN Person
      FILTER p1.id == 933
      FOR p2, k IN 1..1 OUTBOUND p1 KNOWS
        RETURN { id: p2.id, firstName: p2.firstName, lastName: p2.lastName, friendship_date: k.creationDate }
  difficulty: medium
  sql_features:
  - join
  description: Two-hop traversal — friends of a given person (cf. LDBC IS-3).
- id: ldbc_q07
  sql: |-
    SELECT po.id, po.content, p.first_name, p.last_name, t.name
    FROM post po
    JOIN person p ON p.id = po.creator_person_id
    JOIN post_has_tag pht ON pht.post_id = po.id
    JOIN tag t ON t.id = pht.tag_id
    WHERE po.creation_date >= '2010-06-01' AND po.creation_date < '2010-06-02';
  expected_cypher: |-
    MATCH (p:Person)<-[:HAS_CREATOR]-(po:Post)-[:HAS_TAG]->(t:Tag)
    WHERE po.creationDate >= datetime('2010-06-01T00:00:00') AND po.creationDate < datetime('2010-06-02T00:00:00')
    RETURN po.id, po.content, p.firstName, p.lastName, t.name
  expected_aql: |-
    FOR po IN Post
      FILTER po.creationDate >= '2010-06-01' AND po.creationDate < '2010-06-02'
      FOR p IN 1..1 OUTBOUND po HAS_CREATOR
        FOR t IN 1..1 OUTBOUND po HAS_TAG
          RETURN { id: po.id, content: po.content, firstName: p.firstName, lastName: p.lastName, name: t.name }
  difficulty: medium
  sql_features:
  - join
  description: Posts with their creator and tags (3-way join).
- id: ldbc_q08
  sql: |-
    SELECT DISTINCT p3.id, p3.first_name, p3.last_name, t.name AS shared_tag
    FROM person p1
    JOIN knows k1 ON k1.person_id = p1.id
    JOIN knows k2 ON k2.person_id = k1.friend_id
    JOIN person p3 ON p3.id = k2.friend_id
    JOIN has_interest hi1 ON hi1.person_id = p1.id
    JOIN has_interest hi3 ON hi3.person_id = p3.id AND hi3.tag_id = hi1.tag_id
    JOIN tag t ON t.id = hi1.tag_id
    WHERE p1.id = 933 AND p3.id <> p1.id;
  expected_cypher: |-
    MATCH (p1:Person {id: 933})-[:KNOWS]->(:Person)-[:KNOWS]->(p3:Person),
          (p1)-[:HAS_INTEREST]->(t:Tag)<-[:HAS_INTEREST]-(p3)
    WHERE p3.id <> p1.id
    RETURN DISTINCT p3.id, p3.firstName, p3.lastName, t.name AS shared_tag
  expected_aql: |-
    FOR p1 IN Person
      FILTER p1.id == 933
      FOR p2 IN 1..1 OUTBOUND p1 KNOWS
        FOR p3 IN 1..1 OUTBOUND p2 KNOWS
          FILTER p3.id != p1.id
          FOR t IN 1..1 OUTBOUND p1 HAS_INTEREST
            FOR t3 IN 1..1 OUTBOUND p3 HAS_INTEREST
              FILTER t3.id == t.id
              RETURN DISTINCT { id: p3.id, firstName: p3.firstName, lastName: p3.lastName, shared_tag: t.name }
  difficulty: hard
  sql_features:
  - distinct
  - join
  description: Friends-of-friends who share a tag interest (4-way join, cf. IC-10).
- id: ldbc_q09
  sql: |-
    SELECT DISTINCT liker.id AS liker_id, liker.first_name, liker.last_name,
                    po.id AS post_id, po.content, l.creation_date AS liked_at
    FROM person liker
    JOIN likes_post l ON l.person_id = liker.id
    JOIN post po ON po.id = l.post_id
    JOIN person creator ON creator.id = po.creator_person_id
    WHERE creator.id = 933
    ORDER BY liked_at DESC
    LIMIT 20;
  expected_cypher: |-
    MATCH (liker:Person)-[l:LIKES]->(po:Post)-[:HAS_CREATOR]->(creator:Person {id: 933})
    RETURN DISTINCT liker.id AS liker_id, liker.firstName, liker.lastName, po.id AS post_id, po.content, l.creationDate AS liked_at
    ORDER BY liked_at DESC
    LIMIT 20
  expected_aql: |-
    FOR creator IN Person
      FILTER creator.id == 933
      FOR po IN 1..1 INBOUND creator HAS_CREATOR
        FILTER IS_SAME_COLLECTION('Post', po)
        FOR liker, l IN 1..1 INBOUND po LIKES
          SORT l.creationDate DESC
          LIMIT 20
          RETURN DISTINCT { liker_id: liker.id, firstName: liker.firstName, lastName: liker.lastName, post_id: po.id, content: po.content, liked_at: l.creationDate }
  difficulty: hard
  sql_features:
  - distinct
  - join
  - order_limit
  description: Polymorphic LIKES across Post target (cf. IC-7).
- id: ldbc_q10
  sql: |-
    SELECT c.id AS comment_id, c.content, c.creation_date, p.first_name, p.last_name
    FROM comment c
    JOIN person p ON p.id = c.creator_person_id
    WHERE c.reply_of_post_id = 1099511627776
    ORDER BY c.creation_date DESC;
  expected_cypher: |-
    MATCH (c:Comment)-[:REPLY_OF]->(:Post {id: 1099511627776}),
          (c)-[:HAS_CREATOR]->(p:Person)
    RETURN c.id AS comment_id, c.content, c.creationDate, p.firstName, p.lastName
    ORDER BY c.creationDate DESC
  expected_aql: |-
    FOR po IN Post
      FILTER po.id == 1099511627776
      FOR c IN 1..1 INBOUND po REPLY_OF
        FILTER IS_SAME_COLLECTION('Comment', c)
        FOR p IN 1..1 OUTBOUND c HAS_CREATOR
          SORT c.creationDate DESC
          RETURN { comment_id: c.id, content: c.content, creationDate: c.creationDate, firstName: p.firstName, lastName: p.lastName }
  difficulty: medium
  sql_features:
  - join
  - order_limit
  description: 'REPLY_OF chain: comments replying to a specific post (cf. IS-7).'
- id: ldbc_q11
  sql: |-
    SELECT f.id, f.title, COUNT(fhm.person_id) AS member_count
    FROM forum f
    LEFT JOIN forum_has_member fhm ON fhm.forum_id = f.id
    GROUP BY f.id, f.title
    ORDER BY member_count DESC;
  expected_cypher: |-
    MATCH (f:Forum)
    OPTIONAL MATCH (f)-[:HAS_MEMBER]->(p:Person)
    RETURN f.id, f.title, count(p) AS member_count
    ORDER BY member_count DESC
  expected_aql: |-
    FOR f IN Forum
      LET member_count = LENGTH(FOR p IN 1..1 OUTBOUND f HAS_MEMBER RETURN 1)
      SORT member_count DESC
      RETURN { id: f.id, title: f.title, member_count: member_count }
  difficulty: hard
  sql_features:
  - aggregation
  - join
  - order_limit
  description: Optional traversal (LEFT JOIN) — forums and their member count including empty forums.
- id: ldbc_q12
  sql: |-
    SELECT p.id, p.first_name, p.last_name, COUNT(*) AS friend_count
    FROM person p
    JOIN knows k ON k.person_id = p.id
    GROUP BY p.id, p.first_name, p.last_name
    HAVING COUNT(*) > 5
    ORDER BY friend_count DESC;
  expected_cypher: |-
    MATCH (p:Person)-[:KNOWS]->(friend:Person)
    WITH p, count(friend) AS friend_count
    WHERE friend_count > 5
    RETURN p.id, p.firstName, p.lastName, friend_count
    ORDER BY friend_count DESC
  expected_aql: |-
    FOR p IN Person
      LET friend_count = LENGTH(FOR f IN 1..1 OUTBOUND p KNOWS RETURN 1)
      FILTER friend_count > 5
      SORT friend_count DESC
      RETURN { id: p.id, firstName: p.firstName, lastName: p.lastName, friend_count: friend_count }
  difficulty: hard
  sql_features:
  - aggregation
  - join
  - order_limit
  description: 'HAVING: persons with more than 5 friends.'
- id: ldbc_q13
  sql: |-
    SELECT DISTINCT p.id, p.first_name, p.last_name
    FROM person p
    JOIN post po ON po.creator_person_id = p.id
    WHERE po.forum_id = 549755813888
    UNION
    SELECT DISTINCT p.id, p.first_name, p.last_name
    FROM person p
    JOIN likes_post l ON l.person_id = p.id
    JOIN post po ON po.id = l.post_id
    WHERE po.forum_id = 549755813888;
  expected_cypher: |-
    MATCH (f:Forum {id: 549755813888})-[:CONTAINER_OF]->(po:Post)<-[:HAS_CREATOR]-(p:Person)
    RETURN DISTINCT p.id, p.firstName, p.lastName
    UNION
    MATCH (f:Forum {id: 549755813888})-[:CONTAINER_OF]->(po:Post)<-[:LIKES]-(p:Person)
    RETURN DISTINCT p.id, p.firstName, p.lastName
  expected_aql: |-
    LET creators = (
      FOR f IN Forum
        FILTER f.id == 549755813888
        FOR po IN 1..1 OUTBOUND f CONTAINER_OF
          FOR p IN 1..1 OUTBOUND po HAS_CREATOR
            RETURN DISTINCT { id: p.id, firstName: p.firstName, lastName: p.lastName }
    )
    LET likers = (
      FOR f IN Forum
        FILTER f.id == 549755813888
        FOR po IN 1..1 OUTBOUND f CONTAINER_OF
          FOR p IN 1..1 INBOUND po LIKES
            RETURN DISTINCT { id: p.id, firstName: p.firstName, lastName: p.lastName }
    )
    FOR x IN UNION_DISTINCT(creators, likers)
      RETURN x
  difficulty: hard
  sql_features:
  - distinct
  - join
  - union
  description: 'UNION: persons who either created OR liked any post in a forum.'
- id: ldbc_q14
  sql: |-
    SELECT p.id, p.first_name, p.last_name
    FROM person p
    WHERE NOT EXISTS (
        SELECT 1 FROM knows k WHERE k.person_id = p.id
    );
  expected_cypher: |-
    MATCH (p:Person)
    WHERE NOT (p)-[:KNOWS]->(:Person)
    RETURN p.id, p.firstName, p.lastName
  expected_aql: |-
    FOR p IN Person
      LET friend_count = LENGTH(FOR f IN 1..1 OUTBOUND p KNOWS RETURN 1)
      FILTER friend_count == 0
      RETURN { id: p.id, firstName: p.firstName, lastName: p.lastName }
  difficulty: hard
  sql_features:
  - subquery
  description: 'DIFFERENCE / NOT EXISTS: persons with no friends.'
