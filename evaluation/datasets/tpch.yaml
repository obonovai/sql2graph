schema: tpch
queries:
- id: tpch_q01
  sql: |-
    SELECT suppkey, name, address, phone
    FROM supplier
    WHERE name = 'Supplier#000000666';
  expected_cypher: |-
    MATCH (s:Supplier {name: 'Supplier#000000666'})
    RETURN s.suppkey, s.name, s.address, s.phone
  expected_aql: |-
    FOR s IN Supplier
      FILTER s.name == 'Supplier#000000666'
      RETURN { suppkey: s.suppkey, name: s.name, address: s.address, phone: s.phone }
  difficulty: easy
  sql_features: []
  description: Point lookup on non-indexed column.
- id: tpch_q02
  sql: |-
    SELECT orderkey, linenumber, shipdate, extendedprice
    FROM lineitem
    WHERE shipdate >= '1995-03-01' AND shipdate <= '1995-03-31';
  expected_cypher: |-
    MATCH (o:Order)-[:CONTAINS]->(li:LineItem)
    WHERE li.shipdate >= date('1995-03-01') AND li.shipdate <= date('1995-03-31')
    RETURN o.orderkey, li.linenumber, li.shipdate, li.extendedprice
  expected_aql: |-
    FOR o IN Order
      FOR li IN 1..1 OUTBOUND o CONTAINS
        FILTER li.shipdate >= '1995-03-01' AND li.shipdate <= '1995-03-31'
        RETURN { orderkey: o.orderkey, linenumber: li.linenumber, shipdate: li.shipdate, extendedprice: li.extendedprice }
  difficulty: easy
  sql_features: []
  description: Range query on a date column.
- id: tpch_q03
  sql: |-
    SELECT suppkey, name, address, phone
    FROM supplier
    WHERE suppkey = 1337;
  expected_cypher: |-
    MATCH (s:Supplier {suppkey: 1337})
    RETURN s.suppkey, s.name, s.address, s.phone
  expected_aql: |-
    FOR s IN Supplier
      FILTER s.suppkey == 1337
      RETURN { suppkey: s.suppkey, name: s.name, address: s.address, phone: s.phone }
  difficulty: easy
  sql_features: []
  description: Point lookup on primary key.
- id: tpch_q04
  sql: |-
    SELECT brand, COUNT(*) AS product_count
    FROM part
    GROUP BY brand
    ORDER BY product_count DESC;
  expected_cypher: |-
    MATCH (p:Part)
    RETURN p.brand AS brand, count(p) AS product_count
    ORDER BY product_count DESC
  expected_aql: |-
    FOR p IN Part
      COLLECT brand = p.brand WITH COUNT INTO product_count
      SORT product_count DESC
      RETURN { brand: brand, product_count: product_count }
  difficulty: medium
  sql_features:
  - aggregation
  - order_limit
  description: COUNT grouped by a property.
- id: tpch_q05
  sql: |-
    SELECT brand, MAX(retailprice) AS max_price
    FROM part
    GROUP BY brand
    ORDER BY max_price DESC;
  expected_cypher: |-
    MATCH (p:Part)
    RETURN p.brand AS brand, max(p.retailprice) AS max_price
    ORDER BY max_price DESC
  expected_aql: |-
    FOR p IN Part
      COLLECT brand = p.brand AGGREGATE max_price = MAX(p.retailprice)
      SORT max_price DESC
      RETURN { brand: brand, max_price: max_price }
  difficulty: medium
  sql_features:
  - aggregation
  - order_limit
  description: MAX grouped by a property.
- id: tpch_q06
  sql: |-
    SELECT s.name AS supplier_name, c.name AS customer_name, c.comment AS customer_comment
    FROM supplier s
    JOIN customer c ON c.nationkey = s.nationkey
    WHERE s.comment LIKE '%special%' AND c.comment LIKE '%special%';
  expected_cypher: |-
    MATCH (s:Supplier)-[:LOCATED_IN]->(n:Nation)<-[:LOCATED_IN]-(c:Customer)
    WHERE s.comment CONTAINS 'special' AND c.comment CONTAINS 'special'
    RETURN s.name AS supplier_name, c.name AS customer_name, c.comment AS customer_comment
  expected_aql: |-
    FOR s IN Supplier
      FOR n IN 1..1 OUTBOUND s LOCATED_IN
        FOR c IN 1..1 INBOUND n LOCATED_IN
          FILTER IS_SAME_COLLECTION('Customer', c)
          FILTER CONTAINS(s.comment, 'special') AND CONTAINS(c.comment, 'special')
          RETURN { supplier_name: s.name, customer_name: c.name, customer_comment: c.comment }
  difficulty: medium
  sql_features:
  - join
  - like
  description: Join through a shared Nation, with string filter.
- id: tpch_q07
  sql: |-
    SELECT p.name AS part_name, o.orderdate AS order_date, o.totalprice AS order_totalprice
    FROM part p
    JOIN lineitem li ON li.partkey = p.partkey
    JOIN orders o ON o.orderkey = li.orderkey;
  expected_cypher: |-
    MATCH (p:Part)<-[:OF_PART]-(li:LineItem)<-[:CONTAINS]-(o:Order)
    RETURN p.name AS part_name, o.orderdate AS order_date, o.totalprice AS order_totalprice
  expected_aql: |-
    FOR p IN Part
      FOR li IN 1..1 INBOUND p OF_PART
        FOR o IN 1..1 INBOUND li CONTAINS
          RETURN { part_name: p.name, order_date: o.orderdate, order_totalprice: o.totalprice }
  difficulty: medium
  sql_features:
  - join
  description: Products with their orders (Part -> LineItem -> Order path).
- id: tpch_q08
  sql: |-
    SELECT c.custkey, c.name AS customer_name, n.name AS customer_nation,
           o.orderkey, o.orderdate, o.totalprice,
           li.linenumber, li.quantity, li.extendedprice,
           p.partkey, p.name AS part_name, p.brand,
           s.suppkey, s.name AS supplier_name
    FROM customer c
    JOIN orders o ON o.custkey = c.custkey
    JOIN lineitem li ON li.orderkey = o.orderkey
    JOIN part p ON p.partkey = li.partkey
    JOIN supplier s ON s.suppkey = li.suppkey
    JOIN nation n ON n.nationkey = c.nationkey;
  expected_cypher: |-
    MATCH (c:Customer)-[:LOCATED_IN]->(n:Nation),
          (c)-[:PLACED]->(o:Order)-[:CONTAINS]->(li:LineItem)-[:OF_PART]->(p:Part),
          (li)-[:SUPPLIED_BY]->(s:Supplier)
    RETURN c.custkey, c.name AS customer_name, n.name AS customer_nation,
           o.orderkey, o.orderdate, o.totalprice,
           li.linenumber, li.quantity, li.extendedprice,
           p.partkey, p.name AS part_name, p.brand,
           s.suppkey, s.name AS supplier_name
  expected_aql: |-
    FOR c IN Customer
      FOR n IN 1..1 OUTBOUND c LOCATED_IN
        FOR o IN 1..1 OUTBOUND c PLACED
          FOR li IN 1..1 OUTBOUND o CONTAINS
            FOR p IN 1..1 OUTBOUND li OF_PART
              FOR s IN 1..1 OUTBOUND li SUPPLIED_BY
                RETURN { custkey: c.custkey, customer_name: c.name, customer_nation: n.name, orderkey: o.orderkey, orderdate: o.orderdate, totalprice: o.totalprice, linenumber: li.linenumber, quantity: li.quantity, extendedprice: li.extendedprice, partkey: p.partkey, part_name: p.name, brand: p.brand, suppkey: s.suppkey, supplier_name: s.name }
  difficulty: medium
  sql_features:
  - join
  description: Complex 5-way join across customer, order, lineitem, part, supplier, nation.
- id: tpch_q09
  sql: |-
    SELECT c.custkey, c.name AS customer_name, c.mktsegment,
           n.name AS nation_name, COUNT(o.orderkey) AS order_count
    FROM customer c
    JOIN orders o ON o.custkey = c.custkey
    JOIN nation n ON n.nationkey = c.nationkey
    GROUP BY c.custkey, c.name, c.mktsegment, n.name
    HAVING COUNT(o.orderkey) > 1;
  expected_cypher: |-
    MATCH (c:Customer)-[:LOCATED_IN]->(n:Nation),
          (c)-[:PLACED]->(o:Order)
    WITH c, n, count(o) AS order_count
    WHERE order_count > 1
    RETURN c.custkey, c.name AS customer_name, c.mktsegment, n.name AS nation_name, order_count
  expected_aql: |-
    FOR c IN Customer
      FOR n IN 1..1 OUTBOUND c LOCATED_IN
        LET order_count = LENGTH(FOR o IN 1..1 OUTBOUND c PLACED RETURN 1)
        FILTER order_count > 1
        RETURN { custkey: c.custkey, customer_name: c.name, mktsegment: c.mktsegment, nation_name: n.name, order_count: order_count }
  difficulty: medium
  sql_features:
  - aggregation
  - join
  description: Customers with more than one order (HAVING clause).
- id: tpch_q10
  sql: |-
    SELECT s.suppkey, s.name AS supplier_name, COUNT(ps.partkey) AS supplied_part_count
    FROM supplier s
    LEFT JOIN partsupp ps ON ps.suppkey = s.suppkey
    GROUP BY s.suppkey, s.name;
  expected_cypher: |-
    MATCH (s:Supplier)
    OPTIONAL MATCH (s)-[:SUPPLIES]->(p:Part)
    RETURN s.suppkey, s.name AS supplier_name, count(p) AS supplied_part_count
  expected_aql: |-
    FOR s IN Supplier
      LET supplied_part_count = LENGTH(FOR p IN 1..1 OUTBOUND s SUPPLIES RETURN 1)
      RETURN { suppkey: s.suppkey, supplier_name: s.name, supplied_part_count: supplied_part_count }
  difficulty: medium
  sql_features:
  - aggregation
  - join
  description: 'Optional traversal (LEFT JOIN): suppliers and count of parts they supply.'
- id: tpch_q11
  sql: |-
    SELECT name, phone FROM supplier
    UNION
    SELECT name, phone FROM customer;
  expected_cypher: |-
    MATCH (s:Supplier)
    RETURN s.name AS name, s.phone AS phone
    UNION
    MATCH (c:Customer)
    RETURN c.name AS name, c.phone AS phone
  expected_aql: |-
    LET suppliers = (FOR s IN Supplier RETURN { name: s.name, phone: s.phone })
    LET customers = (FOR c IN Customer RETURN { name: c.name, phone: c.phone })
    FOR x IN UNION_DISTINCT(suppliers, customers)
      RETURN x
  difficulty: medium
  sql_features:
  - union
  description: 'UNION: phone numbers of all suppliers and customers.'
- id: tpch_q12
  sql: |-
    SELECT c.custkey, c.name
    FROM customer c
    WHERE NOT EXISTS (
        SELECT 1 FROM orders o WHERE o.custkey = c.custkey
    );
  expected_cypher: |-
    MATCH (c:Customer)
    WHERE NOT (c)-[:PLACED]->(:Order)
    RETURN c.custkey, c.name
  expected_aql: |-
    FOR c IN Customer
      LET order_count = LENGTH(FOR o IN 1..1 OUTBOUND c PLACED RETURN 1)
      FILTER order_count == 0
      RETURN { custkey: c.custkey, name: c.name }
  difficulty: hard
  sql_features:
  - subquery
  description: 'DIFFERENCE: customers with no orders.'
- id: tpch_q13
  sql: |-
    SELECT partkey, name, brand, retailprice
    FROM part
    ORDER BY brand, retailprice DESC;
  expected_cypher: |-
    MATCH (p:Part)
    RETURN p.partkey, p.name, p.brand, p.retailprice
    ORDER BY p.brand, p.retailprice DESC
  expected_aql: |-
    FOR p IN Part
      SORT p.brand ASC, p.retailprice DESC
      RETURN { partkey: p.partkey, name: p.name, brand: p.brand, retailprice: p.retailprice }
  difficulty: medium
  sql_features:
  - order_limit
  description: Sorting.
- id: tpch_q14
  sql: |-
    SELECT DISTINCT p.brand, n.name AS supplier_nation
    FROM part p
    JOIN partsupp ps ON ps.partkey = p.partkey
    JOIN supplier s ON s.suppkey = ps.suppkey
    JOIN nation n ON n.nationkey = s.nationkey;
  expected_cypher: |-
    MATCH (p:Part)<-[:SUPPLIES]-(s:Supplier)-[:LOCATED_IN]->(n:Nation)
    RETURN DISTINCT p.brand, n.name AS supplier_nation
  expected_aql: |-
    FOR p IN Part
      FOR s IN 1..1 INBOUND p SUPPLIES
        FOR n IN 1..1 OUTBOUND s LOCATED_IN
          RETURN DISTINCT { brand: p.brand, supplier_nation: n.name }
  difficulty: medium
  sql_features:
  - distinct
  - join
  description: DISTINCT across a join.
