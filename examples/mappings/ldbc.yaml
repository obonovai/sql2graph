# Relational-to-graph mapping for the LDBC Social Network Benchmark (Interactive v1) dataset.

nodes:
  - label: "Person"
    source_table: "person"
    properties:
      id: "id"
      firstName: "first_name"
      lastName: "last_name"
      gender: "gender"
      birthday:
        column: "birthday"
        type: "date"
      creationDate:
        column: "creation_date"
        type: "datetime"
      locationIP: "location_ip"
      browserUsed: "browser_used"
    primary_key: "id"
  - label: "Forum"
    source_table: "forum"
    properties:
      id: "id"
      title: "title"
      creationDate:
        column: "creation_date"
        type: "datetime"
    primary_key: "id"
  - label: "Post"
    source_table: "post"
    properties:
      id: "id"
      imageFile: "image_file"
      creationDate:
        column: "creation_date"
        type: "datetime"
      locationIP: "location_ip"
      browserUsed: "browser_used"
      language: "language"
      content: "content"
      length: "length"
    primary_key: "id"
  - label: "Comment"
    source_table: "comment"
    properties:
      id: "id"
      creationDate:
        column: "creation_date"
        type: "datetime"
      locationIP: "location_ip"
      browserUsed: "browser_used"
      content: "content"
      length: "length"
    primary_key: "id"
  - label: "Place"
    source_table: "place"
    properties:
      id: "id"
      name: "name"
      url: "url"
      type: "type"
    primary_key: "id"
  - label: "Organisation"
    source_table: "organisation"
    properties:
      id: "id"
      type: "type"
      name: "name"
      url: "url"
    primary_key: "id"
  - label: "Tag"
    source_table: "tag"
    properties:
      id: "id"
      name: "name"
      url: "url"
    primary_key: "id"
  - label: "TagClass"
    source_table: "tagclass"
    properties:
      id: "id"
      name: "name"
      url: "url"
    primary_key: "id"
edges:
  - type: "CONTAINER_OF"
    source_node: "Forum"
    target_node: "Post"
    source_table: "post"
    source_foreign_key: "forum_id"
    target_primary_key: "id"
  - type: "HAS_CREATOR"
    source_node: "Post"
    target_node: "Person"
    source_table: "post"
    source_foreign_key: "creator_person_id"
    target_primary_key: "id"
  - type: "HAS_CREATOR"
    source_node: "Comment"
    target_node: "Person"
    source_table: "comment"
    source_foreign_key: "creator_person_id"
    target_primary_key: "id"
  - type: "IS_LOCATED_IN"
    source_node: "Post"
    target_node: "Place"
    source_table: "post"
    source_foreign_key: "place_id"
    target_primary_key: "id"
  - type: "IS_LOCATED_IN"
    source_node: "Comment"
    target_node: "Place"
    source_table: "comment"
    source_foreign_key: "place_id"
    target_primary_key: "id"
  - type: "IS_LOCATED_IN"
    source_node: "Person"
    target_node: "Place"
    source_table: "person"
    source_foreign_key: "place_id"
    target_primary_key: "id"
  - type: "IS_LOCATED_IN"
    source_node: "Organisation"
    target_node: "Place"
    source_table: "organisation"
    source_foreign_key: "place_id"
    target_primary_key: "id"
  - type: "REPLY_OF"
    source_node: "Comment"
    target_node: "Post"
    source_table: "comment"
    source_foreign_key: "reply_of_post_id"
    target_primary_key: "id"
  - type: "REPLY_OF"
    source_node: "Comment"
    target_node: "Comment"
    source_table: "comment"
    source_foreign_key: "reply_of_comment_id"
    target_primary_key: "id"
  - type: "HAS_MODERATOR"
    source_node: "Forum"
    target_node: "Person"
    source_table: "forum"
    source_foreign_key: "moderator_person_id"
    target_primary_key: "id"
  - type: "IS_PART_OF"
    source_node: "Place"
    target_node: "Place"
    source_table: "place"
    source_foreign_key: "partof_id"
    target_primary_key: "id"
  - type: "IS_SUBCLASS_OF"
    source_node: "TagClass"
    target_node: "TagClass"
    source_table: "tagclass"
    source_foreign_key: "subclassof_id"
    target_primary_key: "id"
  - type: "HAS_TYPE"
    source_node: "Tag"
    target_node: "TagClass"
    source_table: "tag"
    source_foreign_key: "tagclass_id"
    target_primary_key: "id"
  - type: "KNOWS"
    source_node: "Person"
    target_node: "Person"
    source_table: "knows"
    source_foreign_key: "friend_id"
    target_primary_key: "id"
    properties:
      creationDate:
        column: "creation_date"
        type: "datetime"
  - type: "HAS_MEMBER"
    source_node: "Forum"
    target_node: "Person"
    source_table: "forum_has_member"
    source_foreign_key: "person_id"
    target_primary_key: "id"
    properties:
      joinDate:
        column: "join_date"
        type: "datetime"
  - type: "HAS_TAG"
    source_node: "Forum"
    target_node: "Tag"
    source_table: "forum_has_tag"
    source_foreign_key: "tag_id"
    target_primary_key: "id"
  - type: "HAS_TAG"
    source_node: "Post"
    target_node: "Tag"
    source_table: "post_has_tag"
    source_foreign_key: "tag_id"
    target_primary_key: "id"
  - type: "HAS_TAG"
    source_node: "Comment"
    target_node: "Tag"
    source_table: "comment_has_tag"
    source_foreign_key: "tag_id"
    target_primary_key: "id"
  - type: "HAS_INTEREST"
    source_node: "Person"
    target_node: "Tag"
    source_table: "has_interest"
    source_foreign_key: "tag_id"
    target_primary_key: "id"
  - type: "LIKES"
    source_node: "Person"
    target_node: "Post"
    source_table: "likes_post"
    source_foreign_key: "post_id"
    target_primary_key: "id"
    properties:
      creationDate:
        column: "creation_date"
        type: "datetime"
  - type: "LIKES"
    source_node: "Person"
    target_node: "Comment"
    source_table: "likes_comment"
    source_foreign_key: "comment_id"
    target_primary_key: "id"
    properties:
      creationDate:
        column: "creation_date"
        type: "datetime"
  - type: "STUDY_AT"
    source_node: "Person"
    target_node: "Organisation"
    source_table: "study_at"
    source_foreign_key: "organisation_id"
    target_primary_key: "id"
    properties:
      classYear: "class_year"
  - type: "WORK_AT"
    source_node: "Person"
    target_node: "Organisation"
    source_table: "work_at"
    source_foreign_key: "organisation_id"
    target_primary_key: "id"
    properties:
      workFrom: "work_from"
